spring.application.name=junior-sidekick

agent.name=Sidekick
agent.state-directory=./data/state
agent.working-directory=./data/workspace

agent.llm.fast.model=openai/gpt-5.4-mini
agent.llm.fast.provider=azure
agent.llm.fast.reasoning-effort=medium

agent.llm.default.model=openai/gpt-5.4-mini
agent.llm.default.provider=azure
agent.llm.default.reasoning-effort=medium

agent.llm.ultrathink.model=openai/gpt-5.5
agent.llm.ultrathink.provider=azure
agent.llm.ultrathink.reasoning-effort=high

adapters.http.enabled=false
adapters.http.token=

agent.tools.bash.enabled=false
agent.tools.bash.provider=http
agent.tools.bash.network-enabled=false
agent.tools.bash.timeout=120
agent.tools.bash.http.base-url=
agent.tools.bash.http.token=

#
# Secrets to provide
#
adapters.slack.bot.token=
adapters.slack.bot.signing-secret=

adapters.open-router.api-key=

integrations.dumphere.base-url=
integrations.dumphere.username=
integrations.dumphere.password=

