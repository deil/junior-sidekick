spring.application.name=junior-sidekick

agent.name=Sidekick
agent.state-directory=./data/state
agent.working-directory=./data/workspace

agent.tools.bash.enabled=false
agent.tools.bash.network-enabled=false
agent.tools.bash.rootfs=
agent.tools.bash.max-output-bytes=51200
agent.tools.bash.uid=65534
agent.tools.bash.gid=65534

#
# Secrets to provide
